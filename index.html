<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GPS Photo → KMZ Converter</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  background:#0f1117;
  color:#fff;
  padding:24px;
}

.app{
  max-width:1100px;
  margin:auto;
}

.header{
  text-align:center;
  margin-bottom:24px;
}

.header h1{
  font-size:32px;
}

.header span{
  color:#7c6ef5;
}

.grid{
  display:grid;
  grid-template-columns:420px 1fr;
  gap:20px;
}

.panel{
  background:#16182a;
  border:1px solid #2a2d4a;
  border-radius:12px;
  padding:20px;
}

.drop-zone{
  border:2px dashed #3a3d60;
  border-radius:10px;
  padding:40px 20px;
  text-align:center;
  cursor:pointer;
  background:#0f1125;
}

.drop-zone.dragover{
  border-color:#7c6ef5;
}

.drop-zone i{
  font-size:42px;
  display:block;
  margin-bottom:10px;
}

input[type=file]{
  display:none;
}

.btn{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:10px 18px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
}

.btn-primary{
  background:#7c6ef5;
  color:#fff;
}

.btn-full{
  width:100%;
  justify-content:center;
  margin-top:12px;
}

.status-box{
  margin-top:14px;
  padding:10px;
  border-radius:8px;
  display:none;
}

.status-box.show{
  display:block;
}

.status-info{
  background:#1a1d35;
}

.status-ok{
  background:#163320;
}

.status-err{
  background:#3a1515;
}

.photo-list{
  max-height:220px;
  overflow:auto;
  margin-top:16px;
  border:1px solid #2a2d4a;
  border-radius:8px;
}

.photo-row{
  display:flex;
  gap:10px;
  padding:10px;
  border-bottom:1px solid #2a2d4a;
  cursor:pointer;
}

.photo-row:hover{
  background:#1b1d33;
}

.photo-thumb{
  width:60px;
  height:60px;
  object-fit:cover;
  border-radius:6px;
}

.map-panel{
  border-radius:10px;
  overflow:hidden;
}

#map{
  width:100%;
  height:650px;
}

@media(max-width:900px){

  .grid{
    grid-template-columns:1fr;
  }

  #map{
    height:350px;
  }
}

</style>
</head>

<body>

<div class="app">

  <div class="header">
    <h1><span>GPS</span> Photo → KMZ</h1>
    <p>
      สร้าง KMZ พร้อม Preview รูปใน Google Earth
    </p>
  </div>

  <div class="grid">

    <div>

      <div class="panel">

        <div class="drop-zone" id="dropZone">

          <i class="ti ti-photo-up"></i>

          <strong>
            ลากรูปมาวาง
          </strong>

          <p style="margin-top:8px;color:#aaa">
            รองรับ JPG / JPEG / HEIC
          </p>

          <button class="btn btn-primary"
          style="margin-top:14px"
          onclick="fileInput.click()">

            <i class="ti ti-folder-open"></i>
            เลือกรูปภาพ

          </button>

          <input type="file"
          id="fileInput"
          multiple
          accept="image/*">

        </div>

        <div class="status-box status-info"
        id="statusBox">

          <span id="statusText">
            Ready
          </span>

        </div>

        <div id="results"
        style="display:none">

          <div style="margin-top:18px">

            <b>
              รูปที่มี GPS:
            </b>

            <span id="gpsCount">
              0
            </span>

          </div>

          <div class="photo-list"
          id="photoList">

          </div>

          <button class="btn btn-primary btn-full"
          id="downloadBtn">

            <i class="ti ti-download"></i>

            ดาวน์โหลด KMZ

          </button>

        </div>

      </div>

    </div>

    <div class="map-panel">
      <div id="map"></div>
    </div>

  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/exif-js/2.3.0/exif.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>

let photosGPS = [];

let map = null;

let markers = [];

const fileInput = document.getElementById('fileInput');

const dropZone = document.getElementById('dropZone');

dropZone.addEventListener('dragover', e => {

  e.preventDefault();

  dropZone.classList.add('dragover');

});

dropZone.addEventListener('dragleave', e => {

  e.preventDefault();

  dropZone.classList.remove('dragover');

});

dropZone.addEventListener('drop', e => {

  e.preventDefault();

  dropZone.classList.remove('dragover');

  handleFiles(e.dataTransfer.files);

});

fileInput.addEventListener('change', e => {

  handleFiles(e.target.files);

});

function setStatus(msg,type='info'){

  const box = document.getElementById('statusBox');

  const txt = document.getElementById('statusText');

  box.className = 'status-box show status-' + type;

  txt.textContent = msg;
}

async function handleFiles(files){

  photosGPS = [];

  markers = [];

  setStatus('กำลังอ่านไฟล์...');

  for(const file of files){

    try{

      const gps = await readGPS(file);

      if(!gps) continue;

      const thumb = await makeThumbnail(file,600);

      const full = await fileToBase64(file);

      photosGPS.push({

        name:file.name,

        lat:gps.lat,

        lng:gps.lng,

        date:gps.date,

        thumb,

        full

      });

    }
    catch(err){

      console.error(err);

    }
  }

  renderResults();

}

function readGPS(file){

  return new Promise((resolve,reject)=>{

    EXIF.getData(file,function(){

      try{

        const lat = EXIF.getTag(this,'GPSLatitude');

        const latRef = EXIF.getTag(this,'GPSLatitudeRef');

        const lng = EXIF.getTag(this,'GPSLongitude');

        const lngRef = EXIF.getTag(this,'GPSLongitudeRef');

        const dt = EXIF.getTag(this,'DateTimeOriginal');

        if(!lat || !lng){

          resolve(null);

          return;
        }

        const la = dms2dd(lat,latRef);

        const lo = dms2dd(lng,lngRef);

        resolve({

          lat:la,

          lng:lo,

          date:dt || ''

        });

      }
      catch(e){

        reject(e);

      }

    });

  });

}

function dms2dd(dms,ref){

  const dd =
    dms[0] +
    dms[1]/60 +
    dms[2]/3600;

  return (
    ref === 'S' || ref === 'W'
  ) ? -dd : dd;
}

function makeThumbnail(file,max){

  return new Promise((resolve,reject)=>{

    const reader = new FileReader();

    reader.onload = e => {

      const img = new Image();

      img.onload = ()=>{

        let w = img.width;

        let h = img.height;

        if(w > h){

          h *= max / w;

          w = max;

        }
        else{

          w *= max / h;

          h = max;
        }

        const c = document.createElement('canvas');

        c.width = w;

        c.height = h;

        c.getContext('2d')
        .drawImage(img,0,0,w,h);

        resolve(
          c.toDataURL('image/jpeg',0.82)
          .split(',')[1]
        );

      };

      img.src = e.target.result;
    };

    reader.onerror = reject;

    reader.readAsDataURL(file);

  });

}

function fileToBase64(file){

  return new Promise((resolve,reject)=>{

    const reader = new FileReader();

    reader.onload = e => {

      resolve(
        e.target.result.split(',')[1]
      );

    };

    reader.onerror = reject;

    reader.readAsDataURL(file);

  });

}

function renderResults(){

  document.getElementById('results')
  .style.display = 'block';

  document.getElementById('gpsCount')
  .textContent = photosGPS.length;

  const list =
    document.getElementById('photoList');

  list.innerHTML = '';

  photosGPS.forEach((p,i)=>{

    const row = document.createElement('div');

    row.className = 'photo-row';

    row.innerHTML = `
      <img class="photo-thumb"
      src="data:image/jpeg;base64,${p.thumb}">

      <div>
        <div>${esc(p.name)}</div>
        <small style="color:#999">
          ${p.lat.toFixed(6)},
          ${p.lng.toFixed(6)}
        </small>
      </div>
    `;

    row.onclick = ()=>focusMarker(i);

    list.appendChild(row);

  });

  initMap();

  setStatus(
    'พบ ' + photosGPS.length + ' รูป',
    'ok'
  );

}

function initMap(){

  if(map){

    map.remove();
  }

  map = L.map('map')
  .setView([13.7563,100.5018],10);

  L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
      maxZoom:19
    }
  ).addTo(map);

  const bounds = [];

  photosGPS.forEach((p,i)=>{

    const marker = L.marker([p.lat,p.lng])
    .addTo(map);

    marker.bindPopup(`
      <b>${esc(p.name)}</b><br>
      ${p.lat.toFixed(6)},
      ${p.lng.toFixed(6)}
    `);

    markers.push(marker);

    bounds.push([p.lat,p.lng]);

  });

  if(bounds.length){

    map.fitBounds(bounds);
  }

}

function focusMarker(i){

  const m = markers[i];

  if(!m) return;

  map.setView(m.getLatLng(),16);

  m.openPopup();

}

document
.getElementById('downloadBtn')
.addEventListener('click',downloadKMZ);

async function downloadKMZ(){

  if(photosGPS.length === 0){

    setStatus('ไม่มีรูป GPS','err');

    return;
  }

  setStatus('กำลังสร้าง KMZ...');

  try{

    const zip = new JSZip();

    let placemarks = '';

    for(let i=0;i<photosGPS.length;i++){

      const p = photosGPS[i];

      const imgName =
        `photo_${i}.jpg`;

      // IMPORTANT:
      // Put image in ROOT

      zip.file(
        imgName,
        p.full,
        {base64:true}
      );

      const html = `
<![CDATA[
<div style="width:420px">

  <img src="${imgName}"
  style="
    width:100%;
    border-radius:6px;
    border:1px solid #ccc;
    margin-bottom:10px;
  ">

  <div style="
    font-family:Arial;
    font-size:13px;
    line-height:1.5;
  ">

    <b>${escX(p.name)}</b><br>

    ${
      p.date
      ? `
      <span style="color:#666">
      Date: ${escX(p.date)}
      </span><br>
      `
      : ''
    }

    <span style="color:#666">
      Lat:
      ${p.lat.toFixed(6)}
    </span><br>

    <span style="color:#666">
      Lng:
      ${p.lng.toFixed(6)}
    </span>

  </div>

</div>
]]>`;

      placemarks += `
<Placemark>

  <name>${escX(p.name)}</name>

  <description>
    ${html}
  </description>

  <styleUrl>
    #photoStyle
  </styleUrl>

  <Point>
    <coordinates>
      ${p.lng},
      ${p.lat},
      0
    </coordinates>
  </Point>

</Placemark>`;

    }

    const kml = `<?xml version="1.0" encoding="UTF-8"?>

<kml xmlns="http://www.opengis.net/kml/2.2">

<Document>

  <name>
    GPS Photos
  </name>

  <open>1</open>

  <Style id="photoStyle">

    <IconStyle>

      <scale>1.2</scale>

      <Icon>

        <href>
https://maps.google.com/mapfiles/kml/paddle/red-circle.png
        </href>

      </Icon>

    </IconStyle>

    <BalloonStyle>

      <bgColor>
        ffffffff
      </bgColor>

      <text>
<![CDATA[
$[description]
]]>
      </text>

    </BalloonStyle>

  </Style>

  <Folder>

    <name>
      Photos
    </name>

    <open>1</open>

    ${placemarks}

  </Folder>

</Document>

</kml>`;

    zip.file('doc.kml',kml);

    const blob =
      await zip.generateAsync({

      type:'blob',

      compression:'DEFLATE',

      compressionOptions:{
        level:6
      }

    });

    const url =
      URL.createObjectURL(blob);

    const a =
      document.createElement('a');

    a.href = url;

    a.download =
      `GPS_Photos_${
        new Date()
        .toISOString()
        .slice(0,10)
      }.kmz`;

    document.body.appendChild(a);

    a.click();

    document.body.removeChild(a);

    setTimeout(()=>{

      URL.revokeObjectURL(url);

    },2000);

    setStatus(
      'สร้าง KMZ สำเร็จ',
      'ok'
    );

  }
  catch(err){

    console.error(err);

    setStatus(
      'เกิดข้อผิดพลาด',
      'err'
    );
  }

}

function esc(t){

  const d = document.createElement('div');

  d.textContent = t;

  return d.innerHTML;
}

function escX(t){

  return String(t)

  .replace(/&/g,'&amp;')

  .replace(/</g,'&lt;')

  .replace(/>/g,'&gt;')

  .replace(/"/g,'&quot;')

  .replace(/'/g,'&apos;');
}

</script>

</body>
</html>
